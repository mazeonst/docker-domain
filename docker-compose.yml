services:
  ldap:
    image: rroemhild/test-openldap:latest
    container_name: test-openldap
    ports:
      - "1389:10389"
  ldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: test-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "ldap"
    ports:
      - "6443:443"
    depends_on:
      - ldap
